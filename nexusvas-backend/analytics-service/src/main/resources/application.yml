server:
  port: 8088

spring:
  application:
    name: analytics-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/nexusvas_analytics}
      auto-index-creation: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    path: /graphql

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_JWK_URI:http://auth-service:8080/.well-known/jwks.json}

logging:
  level:
    dev.armanruhit.nexusvas.analytics: DEBUG
