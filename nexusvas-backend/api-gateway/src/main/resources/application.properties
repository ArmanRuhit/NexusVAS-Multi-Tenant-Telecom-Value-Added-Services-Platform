# Server Configuration
server.port=8080

# Spring Application
spring.application.name=api-gateway

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_JWK_URI:http://auth-service:8081/.well-known/jwks.json}

# Gateway Default Filters
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# ── Auth Service Route ────────────────────────────────────────────────────
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URI:http://auth-service:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# ── Subscription Service Route ─────────────────────────────────────────
spring.cloud.gateway.routes[1].id=subscription-service
spring.cloud.gateway.routes[1].uri=${SUBSCRIPTION_SERVICE_URI:http://subscription-service:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/subscriptions/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

# ── Billing Service Route ───────────────────────────────────────────────
spring.cloud.gateway.routes[2].id=billing-service
spring.cloud.gateway.routes[2].uri=${BILLING_SERVICE_URI:http://billing-service:8083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/billing/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0

# ── Notification Service Route ──────────────────────────────────────────
spring.cloud.gateway.routes[3].id=notification-service
spring.cloud.gateway.routes[3].uri=${NOTIFICATION_SERVICE_URI:http://notification-service:8087}
spring.cloud.gateway.routes[3].predicates[0]=Path=/notifications/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0

# ── Content Service Route ───────────────────────────────────────────────
spring.cloud.gateway.routes[4].id=content-service
spring.cloud.gateway.routes[4].uri=${CONTENT_SERVICE_URI:http://content-service:8085}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/content/**, /api/v1/delivery/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=0

# ── Campaign Service Route ──────────────────────────────────────────────
spring.cloud.gateway.routes[5].id=campaign-service
spring.cloud.gateway.routes[5].uri=${CAMPAIGN_SERVICE_URI:http://campaign-service:8086}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/campaigns/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=0

# ── Analytics Service Route (GraphQL) ───────────────────────────────────
spring.cloud.gateway.routes[6].id=analytics-service
spring.cloud.gateway.routes[6].uri=${ANALYTICS_SERVICE_URI:http://analytics-service:8088}
spring.cloud.gateway.routes[6].predicates[0]=Path=/graphql, /graphiql/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=0

# ── AI Service Route ───────────────────────────────────────────────────
spring.cloud.gateway.routes[7].id=ai-service
spring.cloud.gateway.routes[7].uri=${AI_SERVICE_URI:http://ai-service:8084}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/ai/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=0

# ── Operator Service Route ──────────────────────────────────────────────
spring.cloud.gateway.routes[8].id=operator-service
spring.cloud.gateway.routes[8].uri=${OPERATOR_SERVICE_URI:http://operator-service:8089}
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/operators/**
spring.cloud.gateway.routes[8].filters[0]=StripPrefix=0

# Rate Limit Configuration
gateway.rate-limit.requests-per-minute=${RATE_LIMIT_RPM:300}

# Management Endpoints
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

# Logging
logging.level.dev.armanruhit.nexusvas.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
