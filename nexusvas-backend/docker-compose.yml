services:
  # ===========================================
  # PostgreSQL - Single instance with 7 databases
  # ===========================================
  postgres: 
    image: pgvector/pgvector:pg17
    container_name: nexusvas-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexusvas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexusvas123}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexusvas}"]
      interval: 10s
      timeout: 5s
      retries: 5
      # start_period: 30s
    networks:
      - nexusvas-network

  # ===========================================
  # MongoDB - Content catalog & analytics
  # ===========================================
  mongodb:
    image: mongo:7.0
    container_name: nexusvas-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-nexusvas}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-nexusvas123}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok | mongosh localhost:27017/test --quiet'
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusvas-network

  # ===========================================
  # Redis - Caching & rate limiting
  # ===========================================
  redis:
    image: redis:alpine
    container_name: nexusvas-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexusvas123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nexusvas123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexusvas-network

  # ===========================================
  # Kafka - KRaft mode (no Zookeeper)
  # ===========================================
  kafka:
    image: bitnami/kafka:latest
    container_name: nexusvas-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "9094:9094"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - nexusvas-network

  # ===========================================
  # RabbitMQ - Task queues with Management UI
  # ===========================================
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: nexusvas-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-nexusvas}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-nexusvas123}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - nexusvas-network

  # ===========================================
  # Zipkin - Distributed tracing (dev only)
  # ===========================================
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: nexusvas-zipkin
    ports:
      - "${ZIPKIN_PORT:-9411}:9411"
    networks:
      - nexusvas-network
    profiles:
      - dev

volumes:
  postgres-data:
  mongodb-data:
  redis-data:
  kafka-data:
  rabbitmq-data:
 
networks:
  nexusvas-network:
    driver: bridge