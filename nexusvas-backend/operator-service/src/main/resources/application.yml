server:
  port: 8089

spring:
  application:
    name: operator-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nexusvas_operator}
    username: ${DB_USERNAME:nexusvas}
    password: ${DB_PASSWORD:nexusvas}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_JWK_URI:http://auth-service:8080/.well-known/jwks.json}

logging:
  level:
    dev.armanruhit.nexusvas.operator: DEBUG
